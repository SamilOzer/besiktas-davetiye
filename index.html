<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB Davetiye">
<meta name="theme-color" content="#e8c84a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Beşiktaş Belediyesi – Davetiye Yönetim Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #e8c84a;
    --accent2: #f0d980;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0a0f 0%, #16162a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo-area { display:flex; align-items:center; gap:16px; }
  .logo-badge {
    width:52px; height:52px; border-radius:12px;
    background: linear-gradient(135deg, var(--accent), #c8a820);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:800; color:#0a0a0f;
  }
  .logo-text h1 { font-size:18px; font-weight:700; letter-spacing:0.3px; }
  .logo-text p { font-size:12px; color:var(--muted); margin-top:2px; }
  .nav-links { display:flex; gap:12px; }
  .nav-btn {
    padding:9px 20px; border-radius:10px; font-size:13px; font-weight:600;
    cursor:pointer; border:none; transition:all 0.2s; text-decoration:none;
    display:inline-flex; align-items:center; gap:7px;
  }
  .nav-btn.primary { background:var(--accent); color:#0a0a0f; }
  .nav-btn.primary:hover { background:var(--accent2); transform:translateY(-1px); }
  .nav-btn.secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .nav-btn.secondary:hover { border-color:var(--accent); color:var(--accent); }

  /* STATS */
  .stats-bar {
    display:flex; gap:16px; padding:28px 40px 0;
  }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 24px; flex:1; display:flex; align-items:center; gap:16px;
    transition:border-color 0.2s;
  }
  .stat-card:hover { border-color:var(--accent); }
  .stat-icon { font-size:28px; }
  .stat-val { font-size:26px; font-weight:800; }
  .stat-label { font-size:12px; color:var(--muted); margin-top:2px; }

  /* MAIN LAYOUT */
  main { padding:28px 40px; display:grid; grid-template-columns:420px 1fr; gap:24px; }

  /* FORM PANEL */
  .panel {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px;
  }
  .panel-title {
    font-size:15px; font-weight:700; margin-bottom:22px;
    display:flex; align-items:center; gap:8px; color:var(--text);
  }
  .panel-title span { color:var(--accent); font-size:18px; }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:0.5px; text-transform:uppercase; }
  .field input, .field select {
    width:100%; padding:12px 16px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif;
    transition:border-color 0.2s, box-shadow 0.2s; outline:none;
  }
  .field input:focus, .field select:focus {
    border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,200,74,0.12);
  }
  .field select option { background:var(--surface2); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .btn-create {
    width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),#c8a820);
    color:#0a0a0f; border:none; border-radius:10px; font-size:15px; font-weight:700;
    cursor:pointer; transition:all 0.2s; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-create:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(232,200,74,0.3); }

  /* QR PREVIEW POPUP */
  .qr-preview {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
    backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center;
  }
  .qr-preview.open { display:flex; }
  .qr-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:36px; max-width:400px; width:90%; text-align:center;
    animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  .qr-card h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
  .qr-card .qr-subtitle { color:var(--muted); font-size:13px; margin-bottom:8px; }
  .qr-card .qr-role {
    display:inline-block; padding:4px 14px; border-radius:20px;
    background:rgba(232,200,74,0.15); color:var(--accent); font-size:12px; font-weight:600;
    margin-bottom:24px;
  }
  #qr-container { background:#fff; padding:16px; border-radius:12px; display:inline-block; margin-bottom:20px; }
  .qr-actions { display:flex; gap:10px; justify-content:center; margin-top:8px; }
  .qr-btn {
    padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .qr-btn.dl { background:var(--accent); color:#0a0a0f; }
  .qr-btn.dl:hover { background:var(--accent2); }
  .qr-btn.cls { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .qr-btn.cls:hover { border-color:var(--danger); color:var(--danger); }

  /* GUEST LIST */
  .list-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .list-header {
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .list-header-title { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .search-box {
    padding:9px 16px; background:var(--bg); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif;
    outline:none; width:220px; transition:border-color 0.2s;
  }
  .search-box:focus { border-color:var(--accent); }

  table { width:100%; border-collapse:collapse; }
  th {
    padding:12px 20px; text-align:left; font-size:11px; font-weight:600;
    color:var(--muted); text-transform:uppercase; letter-spacing:0.6px;
    border-bottom:1px solid var(--border); background:var(--bg);
  }
  td { padding:14px 20px; font-size:13px; border-bottom:1px solid rgba(42,42,58,0.5); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .badge {
    display:inline-flex; align-items:center; gap:5px; padding:4px 10px;
    border-radius:20px; font-size:11px; font-weight:600;
  }
  .badge.checked { background:rgba(74,222,128,0.12); color:var(--success); }
  .badge.pending { background:rgba(232,200,74,0.12); color:var(--accent); }
  .badge.vip { background:rgba(168,85,247,0.15); color:#c084fc; }
  .badge.press { background:rgba(56,189,248,0.15); color:#7dd3fc; }
  .badge.staff { background:rgba(251,146,60,0.15); color:#fb923c; }
  .badge.guest { background:rgba(148,163,184,0.15); color:#94a3b8; }
  .action-btns { display:flex; gap:6px; }
  .action-btn {
    padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .action-btn.show { background:rgba(232,200,74,0.1); color:var(--accent); border:1px solid rgba(232,200,74,0.2); }
  .action-btn.show:hover { background:rgba(232,200,74,0.2); }
  .action-btn.del { background:rgba(248,113,113,0.1); color:var(--danger); border:1px solid rgba(248,113,113,0.2); }
  .action-btn.del:hover { background:rgba(248,113,113,0.2); }
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* TOAST */
  .toast {
    position:fixed; bottom:30px; right:30px; z-index:9999;
    background:var(--surface2); border:1px solid var(--border); border-radius:12px;
    padding:14px 20px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px;
    transform:translateY(100px); opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:var(--success); }
  .toast.error { border-color:var(--danger); }

  /* MOBILE */
  @media(max-width:768px) {
    header { padding:14px 16px; }
    .logo-text h1 { font-size:14px; }
    .logo-text p { display:none; }
    .nav-links { gap:8px; }
    .nav-btn { padding:8px 12px; font-size:12px; }
    .stats-bar { padding:16px 16px 0; gap:10px; flex-wrap:wrap; }
    .stat-card { min-width:calc(50% - 5px); padding:14px 16px; }
    .stat-val { font-size:20px; }
    main { padding:16px; grid-template-columns:1fr; }
    .list-header { flex-direction:column; align-items:flex-start; gap:10px; }
    .search-box { width:100%; }
    th:nth-child(2), td:nth-child(2),
    th:nth-child(4), td:nth-child(4) { display:none; }
    td, th { padding:10px 12px; }
    .qr-card { padding:24px 20px; }
    .toast { bottom:20px; right:16px; left:16px; }
    .field input, .field select { font-size:16px; }
  }
  @media(max-width:400px) {
    th:nth-child(3), td:nth-child(3) { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-badge">BŞ</div>
    <div class="logo-text">
      <h1>Beşiktaş Belediyesi</h1>
      <p>Davetiye Yönetim Sistemi — Lansman 2026</p>
    </div>
  </div>
  <div class="nav-links">
    <a href="scanner.html" class="nav-btn secondary">📷 Kapı Kontrol Paneli</a>
    <button class="nav-btn primary" onclick="exportCSV()">⬇️ CSV Dışa Aktar</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-icon">🎟️</div>
    <div>
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">Toplam Davetli</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">✅</div>
    <div>
      <div class="stat-val" id="stat-checked">0</div>
      <div class="stat-label">Giriş Yaptı</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">⏳</div>
    <div>
      <div class="stat-val" id="stat-pending">0</div>
      <div class="stat-label">Bekleniyor</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">👑</div>
    <div>
      <div class="stat-val" id="stat-vip">0</div>
      <div class="stat-label">VIP Davetli</div>
    </div>
  </div>
</div>

<main>
  <!-- FORM -->
  <div class="panel">
    <div class="panel-title"><span>✦</span> Yeni Davetiye Oluştur</div>
    <div class="field">
      <label>Ad Soyad *</label>
      <input type="text" id="f-name" placeholder="Örn: Ahmet Yılmaz" />
    </div>
    <div class="field">
      <label>Kurum / Ünvan</label>
      <input type="text" id="f-org" placeholder="Örn: Beşiktaş Belediye Başkanı" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Davetli Tipi *</label>
        <select id="f-type">
          <option value="VIP">👑 VIP</option>
          <option value="Basın">📰 Basın</option>
          <option value="Personel">🔧 Personel</option>
          <option value="Misafir" selected>🎟️ Misafir</option>
        </select>
      </div>
      <div class="field">
        <label>Masa / Alan</label>
        <input type="text" id="f-seat" placeholder="Örn: A-12" />
      </div>
    </div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" id="f-email" placeholder="davetli@ornek.com" />
    </div>
    <div class="field">
      <label>Telefon</label>
      <input type="tel" id="f-phone" placeholder="+90 5XX XXX XX XX" />
    </div>
    <button class="btn-create" onclick="createInvite()">✨ Davetiye Oluştur & QR Göster</button>
  </div>

  <!-- LIST -->
  <div class="list-panel">
    <div class="list-header">
      <div class="list-header-title">📋 Davetli Listesi</div>
      <input class="search-box" type="text" placeholder="🔍 İsim veya kurum ara..." oninput="filterGuests(this.value)" />
    </div>
    <div id="table-wrapper">
      <div class="empty-state">
        <div class="empty-icon">🎪</div>
        <p>Henüz davetiye oluşturulmadı.<br>Sol panelden yeni davetiye ekleyin.</p>
      </div>
    </div>
  </div>
</main>

<!-- QR POPUP -->
<div class="qr-preview" id="qr-popup">
  <div class="qr-card">
    <h2 id="qr-name">—</h2>
    <p class="qr-subtitle" id="qr-org">—</p>
    <span class="qr-role" id="qr-role">—</span>
    <br>
    <div id="qr-container"></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:16px;" id="qr-id-label">—</p>
    <div class="qr-actions">
      <button class="qr-btn dl" onclick="downloadQR()">⬇️ İndir</button>
      <button class="qr-btn cls" onclick="closeQR()">✕ Kapat</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let guests = JSON.parse(localStorage.getItem('bb_guests') || '[]');
let currentQRGuest = null;

function save() {
  localStorage.setItem('bb_guests', JSON.stringify(guests));
}

function uid() {
  return 'BBD-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2,4).toUpperCase();
}

function typeClass(t) {
  const m = { VIP:'vip', Basın:'press', Personel:'staff', Misafir:'guest' };
  return m[t] || 'guest';
}

function typeEmoji(t) {
  const m = { VIP:'👑', Basın:'📰', Personel:'🔧', Misafir:'🎟️' };
  return m[t] || '🎟️';
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.className = 'toast ' + type;
  el.innerHTML = (type === 'success' ? '✅' : '❌') + ' ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function updateStats() {
  document.getElementById('stat-total').textContent = guests.length;
  document.getElementById('stat-checked').textContent = guests.filter(g=>g.checked).length;
  document.getElementById('stat-pending').textContent = guests.filter(g=>!g.checked).length;
  document.getElementById('stat-vip').textContent = guests.filter(g=>g.type==='VIP').length;
}

function renderTable(list) {
  const wrap = document.getElementById('table-wrapper');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Sonuç bulunamadı.</p></div>`;
    return;
  }
  let rows = list.map(g => `
    <tr>
      <td><strong>${g.name}</strong></td>
      <td style="color:var(--muted)">${g.org || '—'}</td>
      <td><span class="badge ${typeClass(g.type)}">${typeEmoji(g.type)} ${g.type}</span></td>
      <td style="color:var(--muted)">${g.seat || '—'}</td>
      <td><span class="badge ${g.checked?'checked':'pending'}">${g.checked?'✅ Girdi':'⏳ Bekliyor'}</span></td>
      <td>
        <div class="action-btns">
          <button class="action-btn show" onclick="showQR('${g.id}')">QR Göster</button>
          <button class="action-btn del" onclick="deleteGuest('${g.id}')">Sil</button>
        </div>
      </td>
    </tr>`).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Ad Soyad</th><th>Kurum</th><th>Tip</th><th>Masa</th><th>Durum</th><th>İşlemler</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function filterGuests(q) {
  const term = q.toLowerCase();
  const filtered = guests.filter(g =>
    g.name.toLowerCase().includes(term) || (g.org||'').toLowerCase().includes(term)
  );
  renderTable(filtered);
}

function createInvite() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Ad Soyad zorunludur!', 'error'); return; }
  const guest = {
    id: uid(),
    name,
    org: document.getElementById('f-org').value.trim(),
    type: document.getElementById('f-type').value,
    seat: document.getElementById('f-seat').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    checked: false,
    createdAt: new Date().toISOString()
  };
  guests.unshift(guest);
  save();
  updateStats();
  renderTable(guests);
  // clear form
  ['f-name','f-org','f-seat','f-email','f-phone'].forEach(id => document.getElementById(id).value='');
  toast(`${name} için davetiye oluşturuldu!`);
  showQR(guest.id);
}

function showQR(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  currentQRGuest = g;
  document.getElementById('qr-name').textContent = g.name;
  document.getElementById('qr-org').textContent = g.org || 'Beşiktaş Belediyesi Lansman 2026';
  document.getElementById('qr-role').textContent = typeEmoji(g.type) + ' ' + g.type;
  document.getElementById('qr-id-label').textContent = 'Davetiye No: ' + g.id;
  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  const payload = JSON.stringify({ id: g.id, name: g.name, type: g.type });
  new QRCode(container, { text: payload, width: 200, height: 200, colorDark:'#000', colorLight:'#fff', correctLevel: QRCode.CorrectLevel.H });
  document.getElementById('qr-popup').classList.add('open');
}

function closeQR() {
  document.getElementById('qr-popup').classList.remove('open');
}

function downloadQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = `davetiye-${currentQRGuest.id}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function deleteGuest(id) {
  if (!confirm('Bu davetiyeyi silmek istediğinizden emin misiniz?')) return;
  guests = guests.filter(g => g.id !== id);
  save();
  updateStats();
  renderTable(guests);
  toast('Davetiye silindi.', 'error');
}

function exportCSV() {
  if (!guests.length) { toast('Dışa aktarılacak davetli yok.', 'error'); return; }
  const headers = ['ID','Ad Soyad','Kurum','Tip','Masa','E-posta','Telefon','Durum','Oluşturulma'];
  const rows = guests.map(g => [g.id, g.name, g.org, g.type, g.seat, g.email, g.phone, g.checked?'Girdi':'Bekliyor', g.createdAt]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c||''}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'davetliler.csv'; a.click();
  toast('CSV dışa aktarıldı!');
}

document.getElementById('qr-popup').addEventListener('click', function(e) {
  if (e.target === this) closeQR();
});

// init
updateStats();
renderTable(guests);

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
