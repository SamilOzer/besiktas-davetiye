<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kapı Kontrol">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Beşiktaş Belediyesi – Kapı Kontrol</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="jsqr.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1c1c28;
    --border: #2a2a3a; --accent: #e8c84a; --accent2: #f0d980;
    --text: #f0f0f5; --muted: #7a7a9a;
    --success: #4ade80; --danger: #f87171; --warning: #fb923c;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  header {
    background:linear-gradient(135deg,#0a0a0f,#16162a);
    border-bottom:1px solid var(--border);
    padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo-area { display:flex; align-items:center; gap:12px; }
  .logo-badge { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,var(--accent),#c8a820); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; color:#0a0a0f; flex-shrink:0; }
  .logo-text h1 { font-size:15px; font-weight:700; }
  .logo-text p { font-size:11px; color:var(--muted); margin-top:1px; }
  .live-clock { font-size:18px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .back-btn { padding:8px 14px; border-radius:9px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text); text-decoration:none; transition:all 0.2s; white-space:nowrap; }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* MINI STATS */
  .mini-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:16px 16px 0; }
  .mini-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
  .mini-stat .val { font-size:22px; font-weight:800; }
  .mini-stat .lbl { font-size:11px; color:var(--muted); margin-top:2px; }
  .mini-stat.ok .val { color:var(--success); }
  .mini-stat.fail .val { color:var(--danger); }
  .mini-stat.dup .val { color:var(--warning); }

  /* SCAN AREA */
  .scan-area { padding:16px; display:flex; flex-direction:column; gap:14px; flex:1; }

  /* BIG SCAN BUTTON */
  .scan-btn-wrap { display:flex; flex-direction:column; gap:10px; }
  .scan-btn {
    width:100%; padding:22px 16px;
    background:linear-gradient(135deg, var(--accent), #c8a820);
    color:#0a0a0f; border:none; border-radius:16px;
    font-size:18px; font-weight:800; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px;
    box-shadow: 0 8px 24px rgba(232,200,74,0.25);
  }
  .scan-btn:active { transform:scale(0.97); }
  .scan-btn-icon { font-size:28px; }

  /* Hidden file input */
  #qr-file-input { display:none; }

  /* MANUAL INPUT */
  .manual-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .manual-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
  .manual-row { display:flex; gap:8px; }
  .manual-input { flex:1; padding:12px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:border-color 0.2s; }
  .manual-input:focus { border-color:var(--accent); }
  .manual-go { padding:12px 18px; background:var(--accent); color:#0a0a0f; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .manual-go:active { background:var(--accent2); }

  /* RESULT CARD */
  .result-card {
    background:var(--surface); border:2px solid var(--border); border-radius:var(--radius);
    padding:24px 20px; display:flex; flex-direction:column; align-items:center; text-align:center;
    min-height:180px; justify-content:center; transition:all 0.35s ease;
  }
  .result-card.success { border-color:var(--success); background:rgba(74,222,128,0.05); }
  .result-card.error   { border-color:var(--danger);  background:rgba(248,113,113,0.05); }
  .result-card.warning { border-color:var(--warning); background:rgba(251,146,60,0.05); }
  .result-icon { font-size:52px; margin-bottom:12px; line-height:1; }
  .result-status { font-size:20px; font-weight:800; margin-bottom:5px; }
  .result-card.success .result-status { color:var(--success); }
  .result-card.error   .result-status { color:var(--danger); }
  .result-card.warning .result-status { color:var(--warning); }
  .result-desc { font-size:13px; color:var(--muted); }

  .guest-info { margin-top:16px; width:100%; background:var(--bg); border-radius:10px; padding:14px; text-align:left; }
  .guest-info-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px; border-bottom:1px solid var(--border); }
  .guest-info-row:last-child { border-bottom:none; }
  .guest-info-row .lbl { color:var(--muted); }
  .guest-info-row .val { font-weight:600; max-width:60%; text-align:right; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge.vip   { background:rgba(168,85,247,0.15); color:#c084fc; }
  .badge.press { background:rgba(56,189,248,0.15);  color:#7dd3fc; }
  .badge.staff { background:rgba(251,146,60,0.15);  color:#fb923c; }
  .badge.guest { background:rgba(148,163,184,0.15); color:#94a3b8; }

  /* LOG */
  .log-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .log-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .log-header h3 { font-size:13px; font-weight:700; }
  .log-clear { font-size:11px; color:var(--muted); cursor:pointer; background:none; border:none; font-family:'Inter',sans-serif; }
  .log-list { max-height:220px; overflow-y:auto; }
  .log-item { padding:10px 16px; border-bottom:1px solid rgba(42,42,58,0.4); display:flex; align-items:center; gap:10px; font-size:12px; }
  .log-item:last-child { border-bottom:none; }
  .log-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .log-dot.ok   { background:var(--success); }
  .log-dot.fail { background:var(--danger); }
  .log-dot.dup  { background:var(--warning); }
  .log-name { font-weight:600; flex:1; }
  .log-time { color:var(--muted); white-space:nowrap; }
  .log-empty { text-align:center; padding:28px; color:var(--muted); font-size:13px; }

  /* Pulse animation */
  @keyframes pulse-border {
    0%,100%{ box-shadow:0 0 0 0 rgba(74,222,128,0.4) }
    50%{ box-shadow:0 0 0 14px rgba(74,222,128,0) }
  }
  .result-card.pulse { animation:pulse-border 0.8s ease-out; }

  /* Processing overlay */
  .processing {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(4px); z-index:999;
    align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  .processing.show { display:flex; }
  .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .processing p { color:var(--text); font-size:14px; font-weight:600; }

  /* Desktop layout */
  @media(min-width:768px) {
    .scan-area { display:grid; grid-template-columns:1fr 1fr; padding:24px 40px; gap:20px; }
    .scan-area > *:first-child { grid-column:1/3; }
    .mini-stats { padding:24px 40px 0; gap:16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-badge">BŞ</div>
    <div class="logo-text">
      <h1>Beşiktaş Belediyesi</h1>
      <p>Kapı Kontrol — Lansman 2026</p>
    </div>
  </div>
  <div class="live-clock" id="clock">--:--:--</div>
  <a href="index.html" class="back-btn">← Yönetim</a>
</header>

<!-- STATS -->
<div class="mini-stats">
  <div class="mini-stat ok"><div class="val" id="ms-ok">0</div><div class="lbl">✅ Kabul</div></div>
  <div class="mini-stat fail"><div class="val" id="ms-fail">0</div><div class="lbl">❌ Red</div></div>
  <div class="mini-stat dup"><div class="val" id="ms-dup">0</div><div class="lbl">⚠️ Mükerrer</div></div>
</div>

<!-- MAIN -->
<div class="scan-area">

  <!-- RESULT CARD -->
  <div class="result-card" id="result-card">
    <div class="result-icon" id="res-icon">📷</div>
    <div class="result-status" id="res-status">Hazır</div>
    <div class="result-desc" id="res-desc">Kamera butonu ile QR kodu okuyun.</div>
    <div id="guest-info-box"></div>
  </div>

  <!-- CAMERA BUTTON -->
  <div class="scan-btn-wrap">
    <button class="scan-btn" onclick="openCamera()">
      <span class="scan-btn-icon">📷</span>
      Kamera ile QR Oku
    </button>
    <input type="file" id="qr-file-input" accept="image/*" capture="environment" onchange="handleImage(event)">
  </div>

  <!-- MANUAL INPUT -->
  <div class="manual-section">
    <div class="manual-title">Manuel Davetiye No</div>
    <div class="manual-row">
      <input class="manual-input" type="text" id="manual-id" placeholder="BBD-XXXXX-XXXX" onkeydown="if(event.key==='Enter')checkManual()">
      <button class="manual-go" onclick="checkManual()">Kontrol</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-panel">
    <div class="log-header">
      <h3>📋 Giriş Kaydı</h3>
      <button class="log-clear" onclick="clearLog()">Temizle</button>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">Henüz kayıt yok.</div>
    </div>
  </div>

</div>

<!-- Processing overlay -->
<div class="processing" id="processing">
  <div class="spinner"></div>
  <p>QR kod okunuyor...</p>
</div>

<script>
let counters = { ok:0, fail:0, dup:0 };
let sessionLog = [];

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR');
}, 1000);

function getGuests() { return JSON.parse(localStorage.getItem('bb_guests') || '[]'); }
function saveGuests(list) { localStorage.setItem('bb_guests', JSON.stringify(list)); }

function typeClass(t) { return { VIP:'vip', Basın:'press', Personel:'staff', Misafir:'guest' }[t] || 'guest'; }
function typeEmoji(t) { return { VIP:'👑', Basın:'📰', Personel:'🔧', Misafir:'🎟️' }[t] || '🎟️'; }

function updateCounters() {
  document.getElementById('ms-ok').textContent = counters.ok;
  document.getElementById('ms-fail').textContent = counters.fail;
  document.getElementById('ms-dup').textContent = counters.dup;
}

function addLog(type, name, detail) {
  sessionLog.unshift({ type, name, detail, time: new Date().toLocaleTimeString('tr-TR') });
  const list = document.getElementById('log-list');
  list.innerHTML = sessionLog.slice(0,30).map(l => `
    <div class="log-item">
      <div class="log-dot ${l.type}"></div>
      <div class="log-name">${l.name}</div>
      <span style="font-size:11px;color:var(--muted)">${l.detail}</span>
      <span class="log-time">${l.time}</span>
    </div>`).join('');
}

function clearLog() {
  sessionLog = [];
  document.getElementById('log-list').innerHTML = '<div class="log-empty">Henüz kayıt yok.</div>';
}

function showResult(type, icon, status, desc, guest) {
  const card = document.getElementById('result-card');
  card.className = 'result-card ' + type;
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-status').textContent = status;
  document.getElementById('res-desc').textContent = desc;
  const box = document.getElementById('guest-info-box');
  if (guest) {
    box.innerHTML = `<div class="guest-info">
      <div class="guest-info-row"><span class="lbl">Ad Soyad</span><span class="val">${guest.name}</span></div>
      <div class="guest-info-row"><span class="lbl">Kurum</span><span class="val">${guest.org || '—'}</span></div>
      <div class="guest-info-row"><span class="lbl">Tip</span><span class="val"><span class="badge ${typeClass(guest.type)}">${typeEmoji(guest.type)} ${guest.type}</span></span></div>
      <div class="guest-info-row"><span class="lbl">Masa</span><span class="val">${guest.seat || '—'}</span></div>
    </div>`;
  } else { box.innerHTML = ''; }
  setTimeout(() => { card.classList.add('pulse'); setTimeout(() => card.classList.remove('pulse'), 1000); }, 10);
}

function processCode(raw) {
  let payload;
  try { payload = JSON.parse(raw); } catch(e) { payload = { id: raw.trim() }; }
  const id = payload.id;
  const guests = getGuests();
  const idx = guests.findIndex(g => g.id === id);

  if (idx === -1) {
    counters.fail++; updateCounters();
    showResult('error', '❌', 'GEÇERSİZ DAVETİYE', 'Bu QR kod sistemde kayıtlı değil!', null);
    addLog('fail', payload.name || id, 'Kayıtsız QR');
    playBeep('fail'); return;
  }
  const guest = guests[idx];
  if (guest.checked) {
    counters.dup++; updateCounters();
    showResult('warning', '⚠️', 'MÜKERRER GİRİŞ', `Bu davetiye daha önce kullanıldı! (${guest.checkedAt || '—'})`, guest);
    addLog('dup', guest.name, 'Daha önce kullanıldı');
    playBeep('dup'); return;
  }
  guests[idx].checked = true;
  guests[idx].checkedAt = new Date().toLocaleTimeString('tr-TR');
  saveGuests(guests);
  counters.ok++; updateCounters();
  showResult('success', '✅', 'HOŞ GELDİNİZ!', 'Giriş onaylandı. İyi eğlenceler!', guest);
  addLog('ok', guest.name, guest.type);
  playBeep('ok');
}

// Open camera via file input
function openCamera() {
  document.getElementById('qr-file-input').click();
}

// Handle captured image and decode QR with jsQR
function handleImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('processing').classList.add('show');

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      // Scale down large images for performance
      const maxDim = 1024;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);
      document.getElementById('processing').classList.remove('show');

      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
      if (code) {
        processCode(code.data);
      } else {
        showResult('error', '🔍', 'QR Okunamadı', 'Fotoğrafı net çekin, QR kod görünür olsun.', null);
      }
      // Reset input so same file can be selected again
      event.target.value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function checkManual() {
  const val = document.getElementById('manual-id').value.trim();
  if (!val) return;
  processCode(val);
  document.getElementById('manual-id').value = '';
}

function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'ok')   { osc.frequency.value = 880; gain.gain.value = 0.3; }
    else if (type === 'fail') { osc.frequency.value = 220; gain.gain.value = 0.4; }
    else { osc.frequency.value = 440; gain.gain.value = 0.2; }
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
